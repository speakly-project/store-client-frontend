<section class="p-cursos">
    <div class="p-cursos__header">
        <div class="header-top">
            <h1>Explore Language Courses</h1>
        </div>
    </div>

    <div class="filters-row">
        <div class="filters">
            <select #language (change)="fetchCourses(language.value, level.value, minPrice.value, maxPrice.value, sortBy.value)">
                <option value="">Language</option>
                @for (lang of (languages$ | async); track lang.code) {
                <option [value]="lang.name">{{ lang.name }}</option>
                }
            </select>
            <select #level (change)="fetchCourses(language.value, level.value, minPrice.value, maxPrice.value, sortBy.value)">
                <option value="">Level</option>
                @for (lvl of (levels$ | async); track lvl.name) {
                <option [value]="lvl.name">{{ lvl.name }}</option>
                }
            </select>
            <input #minPrice type="number" placeholder="Min price" />
            <input #maxPrice type="number" placeholder="Max price" />
            <select #sortBy (change)="fetchCourses(language.value, level.value, minPrice.value, maxPrice.value, sortBy.value)">
                <option value="">Order by</option>
                <option value="ascPrice">Ascending price</option>
                <option value="descPrice">Descending price</option>
            </select>
            <button (click)="fetchCourses(language.value, level.value, minPrice.value, maxPrice.value, sortBy.value)">Search</button>
        </div>
    </div>

    <div class="results-row">
        <div class="results-count">{{ totalElements || courses.length }} courses found</div>
    </div>



    <div class="cursos-grid">
        @for (c of courses; track $index) {
        <c-curso [course]="c"></c-curso>
        }
    </div>

    @if (totalPages > 1) {
    <div class="pagination">
        <button (click)="prevPage(language.value, level.value, minPrice.value, maxPrice.value, sortBy.value)" [disabled]="currentPage === 1">&lt;</button>
        @for (p of pages; track p) {
        <button (click)="goToPage(p, language.value, level.value, minPrice.value, maxPrice.value, sortBy.value)" [class.active]="currentPage === p">{{ p }}</button>
        }
        <button (click)="nextPage(language.value, level.value, minPrice.value, maxPrice.value, sortBy.value)" [disabled]="currentPage === totalPages">&gt;</button>
    </div>
    }
</section>
